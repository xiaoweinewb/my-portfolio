<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的创作世界 | 个人作品集</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <!-- Markdown Parser -->
    <script src="js/marked.min.js"></script>
</head>
<body>
    <!-- Starfield Background -->
    <canvas id="starfield" aria-hidden="true"></canvas>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">创作集</a>
            <button class="nav-toggle" aria-label="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu">
                <li><a href="#hero" class="nav-link active">首页</a></li>
                <li><a href="#photos" class="nav-link">摄影</a></li>
                <li><a href="#videos" class="nav-link">视频</a></li>
                <li><a href="#music" class="nav-link">音乐</a></li>
                <li><a href="#writings" class="nav-link">文字</a></li>
                <li><a href="#about" class="nav-link">关于</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="hero" class="hero">
        <div class="hero-content" id="heroContent"></div>
        <a href="#photos" class="scroll-indicator">
            <span class="scroll-text">向下滚动</span>
            <svg class="scroll-arrow" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 5v14M19 12l-7 7-7-7"/>
            </svg>
        </a>
    </section>

    <!-- Photos Section -->
    <section id="photos" class="section">
        <div class="container">
            <div class="section-header">
                <span class="section-tag">Photography</span>
                <h2 class="section-title">摄影作品</h2>
                <p class="section-desc">用镜头捕捉稍纵即逝的瞬间，用光影讲述无声的故事</p>
            </div>
            <div class="photo-grid" id="photoGrid"></div>
        </div>
    </section>

    <!-- Videos Section -->
    <section id="videos" class="section section-dark">
        <div class="container">
            <div class="section-header">
                <span class="section-tag">Videography</span>
                <h2 class="section-title">视频创作</h2>
                <p class="section-desc">用动态影像记录生活，用镜头语言讲述故事</p>
            </div>
            <div class="video-grid" id="videoGrid"></div>
        </div>
    </section>

    <!-- Music Section -->
    <section id="music" class="section">
        <div class="container">
            <div class="section-header">
                <span class="section-tag">Music</span>
                <h2 class="section-title">音乐创作</h2>
                <p class="section-desc">用旋律记录心情，用歌声传递情感</p>
            </div>
            <div class="music-grid" id="musicGrid"></div>
            <!-- Audio Player -->
            <div class="audio-player" id="audioPlayer">
                <div class="player-track-info">
                    <img src="" alt="" class="player-cover" id="playerCover">
                    <div class="player-text">
                        <h4 id="playerTitle">选择一首歌曲</h4>
                        <p id="playerArtist">未知艺术家</p>
                    </div>
                </div>
                <div class="player-controls">
                    <button class="player-btn" id="prevBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                        </svg>
                    </button>
                    <button class="player-btn player-btn-main" id="playBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" id="playIcon">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </button>
                    <button class="player-btn" id="nextBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                        </svg>
                    </button>
                </div>
                <div class="player-progress">
                    <span id="currentTime">0:00</span>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span id="duration">0:00</span>
                </div>
                <div class="player-volume">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                    </svg>
                    <input type="range" min="0" max="100" value="80" class="volume-slider" id="volumeSlider">
                </div>
                <audio id="audioElement"></audio>
            </div>
        </div>
    </section>

    <!-- Writings Section -->
    <section id="writings" class="section section-dark">
        <div class="container">
            <div class="section-header">
                <span class="section-tag">Writings</span>
                <h2 class="section-title">文字记录</h2>
                <p class="section-desc">随想、感悟、旅行笔记，记录生活的点滴思考</p>
            </div>
            <div class="writings-list" id="writingsList"></div>
        </div>
    </section>

    <!-- About Section -->
    <section id="about" class="section">
        <div class="container">
            <div class="about-wrapper" id="aboutWrapper">
                <div class="about-photo-gallery" id="photoGallery">
                    <div class="gallery-container" id="galleryContainer"></div>
                    <div class="gallery-hint">滑动鼠标切换照片</div>
                </div>
                <div class="about-content" id="aboutContent"></div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 我的创作世界. 用心创作，记录美好.</p>
        </div>
    </footer>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" aria-label="关闭">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
        </button>
        <button class="lightbox-nav lightbox-prev" aria-label="上一张">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </button>
        <button class="lightbox-nav lightbox-next" aria-label="下一张">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M9 18l6-6-6-6"/>
            </svg>
        </button>
        <img src="" alt="" class="lightbox-image" id="lightboxImage">
    </div>

    <!-- Video Modal -->
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <button class="modal-close" aria-label="关闭">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
            <video controls id="modalVideo">
                <source src="" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- Writing Preview Modal -->
    <div class="writing-modal" id="writingModal">
        <div class="writing-modal-backdrop"></div>
        <div class="writing-modal-content">
            <button class="writing-modal-close" aria-label="关闭">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
            <div class="writing-modal-body" id="writingModalBody">
                <h1 class="writing-modal-title" id="writingModalTitle"></h1>
                <div class="writing-modal-article" id="writingModalArticle"></div>
            </div>
        </div>
    </div>

    <!-- Social QR Modal -->
    <div class="social-modal" id="socialModal">
        <div class="social-modal-backdrop"></div>
        <div class="social-modal-content">
            <button class="social-modal-close" aria-label="关闭">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
            <div class="social-modal-body">
                <h3 class="social-modal-title" id="socialModalTitle"></h3>
                <img src="" alt="" class="social-modal-qrcode" id="socialModalQRCode">
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
